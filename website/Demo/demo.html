<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zekken Demo | Zekken Programming Language</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../../images/zekken_icon.png">
  <link rel="stylesheet" href="../Demo/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
  <script src="js/zekken_highlighter.js"></script>
</head>
<body>
  <div class="navbar">
    <img src="../../images/zekken_icon.png" alt="Zekken Logo" class="logo-img">
    
    <nav>
      <a href="https://github.com/OzRAGEHarm/Zekken" class="github-btn" target="_blank" rel="noopener" title="View on GitHub">
        <img src="../../images/github.png" alt="GitHub" class="github-icon">
      </a>
      <a href="../../index.html">Home</a>
      <a href="demo.html" class="active">Demo</a>
      <a href="../Docs/getting-started.html">Docs</a>
      <a href="../Download/download.html">Download</a>
    </nav>
    <button class="hamburger" aria-label="Open menu" tabindex="0">
      <span></span><span></span><span></span>
    </button>
  </div>
  <script>
    // Hamburger menu toggle
    const hamburger = document.querySelector('.hamburger');
    const navbar = document.querySelector('.navbar');
    const nav = document.querySelector('.navbar nav');
    hamburger.addEventListener('click', () => {
      navbar.classList.toggle('menu-open');
      hamburger.classList.toggle('active');
    });
    // Close menu when clicking a nav link (mobile)
    nav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navbar.classList.remove('menu-open');
        hamburger.classList.remove('active');
      });
    });
  </script>

  <div class="container">
    <h2>Zekken Programming Language Demo</h2>

    <select id="exampleSelect">
      <option value="">Select an Example</option>
      <option value="fibonacci">Fibonacci Sequence</option>
      <option value="hello_world">Hello, World!</option>
      <option value="bmi_calculator">BMI Calculator</option>
      <option value="array_methods">Array Methods</option>
      <option value="object_loop">Object Loop</option>
      <option value="casting_demo">Type Casting</option>
      <option value="try_catch_demo">Try/Catch Demo</option>
    </select>

    <textarea id="code" spellcheck="false">// Write Zekken code here
@println => |"Hello, Web!"|</textarea>
    <div class="button-row">
      <button id="runBtn">Run</button>
      <button id="resetBtn">Reset</button> 
    </div>
    <div id="execTime" class="exec-time">Execution time: --</div>
    <pre id="output" class="output-area">(output will appear here)</pre>
  </div>

  <script type="module">
    import init, { run_zekken, clear_errors } from "./js/WASM/zekken_wasm.js";
    
    let ready = false;
    init("./js/WASM/zekken_wasm_bg.wasm").then(() => ready = true);

    // Initialize input editor
    const editor = CodeMirror.fromTextArea(document.getElementById('code'), {
      mode: "text/x-zekken",
      theme: 'dracula',
      lineNumbers: true,
      tabSize: 2,
      indentUnit: 2,
      autofocus: true,
      viewportMargin: Infinity,
      lineWrapping: true,
      extraKeys: {
        "Tab": (cm) => cm.replaceSelection("  "),
      }
    });

	    editor.setSize('100%', '180px');

	    // If opened from Docs via "Run in Demo", load the snippet from localStorage.
	    (function loadSnippetFromDocs() {
	      try {
	        const params = new URLSearchParams(window.location.search);
	        const fromDocs = params.get("from") === "docs";
	        if (!fromDocs) return;
	        const src = localStorage.getItem("zekken.demo.code");
	        if (src && src.trim().length > 0) {
	          editor.setValue(src);
	          document.getElementById('exampleSelect').value = "";
	          showOutput("(output will appear here)");
	          showExecTime(null);
	        }
	      } catch (_) {}
	    })();

    // Convert ANSI color codes to HTML spans for error highlighting
    function ansiToHtml(text) {
      const ansiMap = [
        { re: /\x1b\[1;31m/g, cls: "ansi-red" },
        { re: /\x1b\[1;35m/g, cls: "ansi-magenta" },
        { re: /\x1b\[1;33m/g, cls: "ansi-yellow" },
        { re: /\x1b\[1;34m/g, cls: "ansi-blue" },
        { re: /\x1b\[1;90m/g, cls: "ansi-gray" },
        { re: /\x1b\[1;32m/g, cls: "ansi-green" },
        { re: /\x1b\[1;37m/g, cls: "ansi-location" },
        { re: /\x1b\[38;2;106;153;85m/g, cls: "ansi-comment" },
        { re: /\x1b\[38;2;86;156;214m/g, cls: "ansi-keyword" },
        { re: /\x1b\[38;2;220;220;170m/g, cls: "ansi-func" },
        { re: /\x1b\[38;2;198;120;221m/g, cls: "ansi-control" },
        { re: /\x1b\[38;2;156;220;254m/g, cls: "ansi-var" },
        { re: /\x1b\[38;2;78;201;176m/g, cls: "ansi-type" },
        { re: /\x1b\[38;2;181;206;168m/g, cls: "ansi-number" },
        { re: /\x1b\[38;2;206;145;120m/g, cls: "ansi-string" },
        { re: /\x1b\[38;2;215;186;125m\x1b\[1m/g, cls: "ansi-escape" },
        { re: /\x1b\[0m/g, cls: "/span" }
      ];
      let html = text
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); // Escape HTML
      ansiMap.forEach(({ re, cls }) => {
        if (cls === "/span") {
          html = html.replace(re, "</span>");
        } else {
          html = html.replace(re, `<span class="${cls}">`);
        }
      });
      // Remove any stray ANSI codes
      html = html.replace(/\x1b\[[0-9;]*m/g, "");
      return html;
    }

    function showOutput(text, isError = false) {
      const output = document.getElementById('output');
      if (isError) {
        output.innerHTML = ansiToHtml(text);
        output.className = "output-area error-output";
      } else {
        output.textContent = text;
        output.className = "output-area";
      }
    }

    function showExecTime(ms) {
      const execTime = document.getElementById('execTime');
      if (typeof ms === "number" && Number.isFinite(ms)) {
        const seconds = ms / 1000;
        execTime.textContent = `Execution time: ${seconds.toFixed(3)} s (${ms.toFixed(3)} ms)`;
      } else {
        execTime.textContent = "Execution time: --";
      }
    }

	    document.getElementById('runBtn').onclick = () => {
	      if (!ready) {
	        showOutput("WASM not loaded yet!", true);
	        showExecTime(null);
	        return;
      }
      clear_errors(); // Clear all errors before running new code
      try {
        const start = performance.now();
        const result = run_zekken(editor.getValue());
        const elapsed = performance.now() - start;
        const isError = result && (
          result.includes("Error:") ||
          result.includes("Syntax Error") ||
          result.includes("Runtime Error") ||
          result.includes("Type Error") ||
          result.includes("Reference Error") ||
          result.includes("Internal Error")
        );
        showOutput(result || "(no output)", isError);
        showExecTime(elapsed);
      } catch (e) {
        showOutput("Error: " + e.message || e, true);
        showExecTime(null);
      }
	    };

	    // Auto-run when opened from Docs with ?autorun=1.
	    (function autorunIfRequested() {
	      try {
	        const params = new URLSearchParams(window.location.search);
	        if (params.get("autorun") !== "1") return;
	        let attempts = 0;
	        const timer = setInterval(() => {
	          attempts++;
	          if (ready) {
	            document.getElementById('runBtn').click();
	            clearInterval(timer);
	          }
	          if (attempts > 200) clearInterval(timer); // ~5s
	        }, 25);
	      } catch (_) {}
	    })();

	    document.getElementById('resetBtn').onclick = () => {
	      clear_errors(); // Also clear errors on reset
	      editor.setValue("// Write Zekken code here\n@println => |\"Hello, Web!\"|");
      document.getElementById('exampleSelect').value = "";
      showOutput("(output will appear here)");
      showExecTime(null);
    };

    // Example selection
    document.getElementById('exampleSelect').addEventListener('change', function() {
      const example = this.value;
      let code = "";
      switch (example) {
        case 'fibonacci':
          code = `func fibonacci | n: int, a: int, b: int, count: int | {
    if count < n {
        @println => |a|
        fibonacci => |n, b, a + b, count + 1|
    }
}

func startFibonacci | n: int | {
    if n > 0 {
        fibonacci => |n, 0, 1, 0|
    }
}

let numTerms: int = 12;

startFibonacci => |numTerms|`;
          break;
        case 'hello_world':
          code = `@println => |"Hello, World!"|`;
          break;
        case 'bmi_calculator':
          code = `func calculate_bmi |weight: float, height: float| {
  let bmi: float = weight / (height * height);
  return bmi;
}

let weight: float = 70.0; // in kg
let height: float = 1.75; // in meters

let bmi: float = calculate_bmi => |weight, height|;
@println => |"BMI: " + bmi|`;
          break;
        case 'array_methods':
          code = `let nums: arr = [2, 4, 6];
nums.push => |8|
let joined: string = nums.join => |"-"|;
@println => |"nums: " + nums|
@println => |"joined: " + joined|
@println => |"first: " + nums.first => |||
@println => |"last: " + nums.last => |||`;
          break;
        case 'object_loop':
          code = `let user: obj = { name: "RAGE", role: "Dev", level: 7 };
for |key, value| in user {
  @println => |key + ": " + value|
}`;
          break;
        case 'casting_demo':
          code = `let a: int = "42".cast => |"int"|;
let b: float = a.cast => |"float"|;
let c: bool = "true".cast => |"bool"|;
@println => |"a=" + a, "b=" + b, "c=" + c|`;
          break;
        case 'try_catch_demo':
          code = `try {
  let bad: int = "Hello".cast => |"int"|;
  @println => |bad|
} catch |e| {
  @println => |"Handled: " + e.message|
}`;
          break;
        default:
          code = "// Write Zekken code here\n@println => |\"Hello, Web!\"|";
      }
      editor.setValue(code);
      showOutput("(output will appear here)");
      showExecTime(null);
    });
  </script>
</body>
</html>
